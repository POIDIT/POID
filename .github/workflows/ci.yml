name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (esbuild sidecar for the M06 DoD tests)
        run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: packages/poid-stdlib/.cache
          key: stdlib-${{ hashFiles('packages/poid-stdlib/src/catalog.json') }}
      - name: Standard Library (M06 DoD tests need it on disk)
        run: pnpm --filter @poid/stdlib build:lib
      - uses: actions/cache@v4
        with:
          path: engines/.cache
          key: pyodide-${{ hashFiles('engines/pyodide.json') }}
      - name: Pyodide engine + the Python DoD fixture's wheels
        run: |
          node scripts/fetch-pyodide.mjs
          node scripts/fetch-wheels.mjs packages/poid-host/e2e/fixtures/python-chart
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: WASM build (poid-wasm, the Web Reader's validation core)
        run: cargo build -p poid-wasm --target wasm32-unknown-unknown
      - name: Conformance fixtures are reproducible
        run: |
          cargo run -p poid-fixtures --bin gen-conformance -- spec/conformance
          git diff --exit-code spec/conformance
      - name: Reference implementation passes the conformance suite
        run: cargo run -p poid-cli -- conformance spec/conformance

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint and format (Biome)
        run: pnpm exec biome ci .
      - uses: actions/cache@v4
        with:
          path: packages/poid-stdlib/.cache
          key: stdlib-${{ hashFiles('packages/poid-stdlib/src/catalog.json') }}
      - name: Standard Library reproduces its pinned checksums
        run: pnpm --filter @poid/stdlib build:lib
      - name: Build
        run: pnpm -r build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm -r test
      - name: Validate manifest schema against conformance fixtures
        run: node scripts/validate-schema.mjs

  studio:
    name: Studio (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Linux system webview (Tauri needs WebKitGTK to link)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/studio/src-tauri
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages (the studio bundles import them)
        run: pnpm -r build
      - name: Build the window bundles (generate_context! embeds frontendDist at compile time)
        run: pnpm --filter @poid/studio build:ui
      - name: Studio crate tests (cli routing, document loading, window state)
        run: cargo test --manifest-path apps/studio/src-tauri/Cargo.toml
      - name: Studio crate clippy
        run: cargo clippy --manifest-path apps/studio/src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Build installers (unsigned; signing is a tracked follow-up)
        run: pnpm --filter @poid/studio exec tauri build
      # Drives the binary `tauri build` just produced: real windows, real Rust
      # backend. Windows only — WebView2 is Chromium and speaks CDP, while the
      # WebKit webviews on macOS and Linux do not. No `playwright install`:
      # the harness attaches to the application, it does not launch a browser.
      - name: Desktop e2e (the real Studio, over CDP)
        if: runner.os == 'Windows'
        run: pnpm --filter @poid/studio e2e
      - uses: actions/upload-artifact@v4
        with:
          name: studio-${{ matrix.os }}
          path: |
            apps/studio/src-tauri/target/release/bundle/msi/*.msi
            apps/studio/src-tauri/target/release/bundle/nsis/*.exe
            apps/studio/src-tauri/target/release/bundle/dmg/*.dmg
            apps/studio/src-tauri/target/release/bundle/deb/*.deb
            apps/studio/src-tauri/target/release/bundle/rpm/*.rpm
            apps/studio/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  browser:
    name: Browser boundary (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            tools/wasm-bindgen-driver
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build packages (SDK/UI needed by the harness)
        run: pnpm -r build
      - name: Build the Web Reader validation core (WASM)
        run: pnpm --filter @poid/web build:wasm
      - uses: actions/cache@v4
        with:
          path: engines/.cache
          key: pyodide-${{ hashFiles('engines/pyodide.json') }}
      - name: Pyodide engine + the Python DoD fixture's wheels
        run: |
          node scripts/fetch-pyodide.mjs
          node scripts/fetch-wheels.mjs packages/poid-host/e2e/fixtures/python-chart
      - name: Install Chromium
        run: pnpm --filter @poid/host exec playwright install --with-deps chromium
      - name: Sandbox boundary e2e (includes the offline Python DoD proof)
        run: pnpm --filter @poid/host e2e
      - name: Web Reader e2e (conformance, zero-network, offline)
        run: pnpm --filter @poid/web e2e
