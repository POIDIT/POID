name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: WASM build (poid-wasm, the Web Reader's validation core)
        run: cargo build -p poid-wasm --target wasm32-unknown-unknown
      - name: Conformance fixtures are reproducible
        run: |
          cargo run -p poid-fixtures --bin gen-conformance -- spec/conformance
          git diff --exit-code spec/conformance
      - name: Reference implementation passes the conformance suite
        run: cargo run -p poid-cli -- conformance spec/conformance

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint and format (Biome)
        run: pnpm exec biome ci .
      - name: Build
        run: pnpm -r build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        run: pnpm -r test
      - name: Validate manifest schema against conformance fixtures
        run: node scripts/validate-schema.mjs

  browser:
    name: Browser boundary (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            tools/wasm-bindgen-driver
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build packages (SDK/UI needed by the harness)
        run: pnpm -r build
      - name: Build the Web Reader validation core (WASM)
        run: pnpm --filter @poid/web build:wasm
      - name: Install Chromium
        run: pnpm --filter @poid/host exec playwright install --with-deps chromium
      - name: Sandbox boundary e2e
        run: pnpm --filter @poid/host e2e
      - name: Web Reader e2e (conformance, zero-network, offline)
        run: pnpm --filter @poid/web e2e
