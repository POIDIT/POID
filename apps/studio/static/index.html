<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>POID Studio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="poid-header">
      <span class="poid-header__mark">◆</span>
      <span class="poid-header__name">POID STUDIO</span>
      <span class="poid-header__sub">applications that behave like documents</span>
    </header>
    <!-- Deliberately empty: the shell fills the navigation from its panel
         registry and each panel renders its own markup, so adding a tool never
         means editing this page. -->
    <div class="hub-shell">
      <nav id="hub-nav" class="hub-nav" aria-label="Studio tools"></nav>
      <main id="hub-panel" class="hub"></main>
    </div>
    <script type="module" src="hub.js"></script>
  </body>
</html>
